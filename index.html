<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCN GML Browser</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        #sidebar {
            width: 320px;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        #sidebar h1 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #00d4aa;
        }
        
        #sidebar .info {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
        }
        
        #map {
            flex: 1;
            height: 100vh;
        }
        
        /* File upload styles */
        .upload-section {
            background: #252540;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .upload-section h2 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #00d4aa;
        }
        
        .upload-dropzone {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 15px;
        }
        
        .upload-dropzone:hover, .upload-dropzone.dragover {
            border-color: #00d4aa;
            background: rgba(0, 212, 170, 0.05);
        }
        
        .upload-dropzone input[type="file"] {
            display: none;
        }
        
        .upload-dropzone p {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        
        .upload-dropzone .file-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .file-selected {
            background: #1e3a2f;
            border: 1px solid #00d4aa;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: #eee;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .file-selected .filename {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .file-selected .filesize {
            color: #888;
            font-size: 0.75rem;
        }
        
        .process-btn {
            width: 100%;
            padding: 12px;
            background: #00d4aa;
            color: #1a1a2e;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .process-btn:hover {
            background: #00e6b8;
        }
        
        .process-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }
        
        .loading-indicator {
            display: none;
            text-align: center;
            padding: 20px;
            color: #00d4aa;
        }
        
        .loading-indicator.active {
            display: block;
        }
        
        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top-color: #00d4aa;
            border-radius: 50%;
            margin: 0 auto 10px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #3a1e1e;
            border: 1px solid #c53030;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
            color: #fc8181;
            font-size: 0.85rem;
            display: none;
        }
        
        .error-message.active {
            display: block;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        .empty-state p {
            font-size: 0.9rem;
        }
        
        /* Filter section */
        .filter-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        
        .filter-section h2 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #00d4aa;
        }
        
        .filter-group {
            margin-bottom: 12px;
        }
        
        .filter-group label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
        }
        
        .filter-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #252540;
            color: #eee;
            font-size: 0.9rem;
        }
        
        .filter-group input:focus {
            outline: none;
            border-color: #00d4aa;
        }
        
        .filter-group input::placeholder {
            color: #555;
        }
        
        .filter-btn {
            width: 100%;
            padding: 10px;
            background: #00d4aa;
            color: #1a1a2e;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .filter-btn:hover {
            background: #00e6b8;
        }
        
        .filter-count {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #888;
            text-align: center;
        }
        
        .filter-count span {
            color: #00d4aa;
            font-weight: 600;
        }
        
        /* Details section */
        .details-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        
        .details-section h2 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #00d4aa;
        }
        
        .details-content {
            background: #252540;
            border-radius: 8px;
            padding: 15px;
        }
        
        .details-content.empty {
            color: #555;
            font-size: 0.9rem;
            text-align: center;
            padding: 30px 15px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            color: #888;
            font-size: 0.85rem;
        }
        
        .detail-value {
            color: #eee;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .detail-value.price {
            color: #22c55e;
        }
        
        /* CSV Export button */
        .export-btn {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 15px;
        }
        
        .export-btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <aside id="sidebar">
        <h1>RCN GML Browser</h1>
        <p class="info">Polish land parcel transactions</p>
        
        <!-- Upload Section -->
        <div class="upload-section">
            <h2>Wgraj plik GML</h2>
            <div class="error-message" id="error_message"></div>
            <div class="upload-dropzone" id="dropzone">
                <input type="file" id="gml_file" accept=".gml">
                <div class="file-icon">📁</div>
                <p>Przeciągnij plik GML lub kliknij aby wybrać</p>
                <p style="font-size: 0.75rem; color: #666;">Maksymalny rozmiar: 200MB</p>
            </div>
            <div class="file-selected" id="file_info" style="display: none;">
                <span class="filename" id="filename"></span>
                <span class="filesize" id="filesize"></span>
            </div>
            <button class="process-btn" id="process_btn" disabled>Przetwórz</button>
        </div>
        
        <div class="loading-indicator" id="loading">
            <div class="loading-spinner"></div>
            <p>Przetwarzanie pliku GML...</p>
        </div>
        
        <!-- Empty state when no data loaded -->
        <div class="empty-state" id="empty_state">
            <div class="icon">🗺️</div>
            <p>Wgraj plik GML, aby zobaczyć działki na mapie</p>
        </div>
        
        <!-- Filter Section (hidden until data loaded) -->
        <div class="filter-section" id="filter_section" style="display: none;">
            <h2>Filtry</h2>
            <div class="filter-group">
                <label for="price_min">Cena od</label>
                <input type="number" id="price_min" placeholder="Cena od">
            </div>
            <div class="filter-group">
                <label for="price_max">Cena do</label>
                <input type="number" id="price_max" placeholder="Cena do">
            </div>
            <div class="filter-group">
                <label for="date_from">Data od</label>
                <input type="date" id="date_from">
            </div>
            <div class="filter-group">
                <label for="date_to">Data do</label>
                <input type="date" id="date_to">
            </div>
            <button class="filter-btn" id="filter_btn">Filtruj</button>
            <p class="filter-count">Widoczne: <span id="filter_count">0/0</span></p>
            <button class="export-btn" id="export_btn">Eksport CSV</button>
        </div>
        
        <div class="details-section" id="details_section" style="display: none;">
            <h2>Szczegóły</h2>
            <div class="details-content empty" id="details_content">
                Kliknij na działkę, aby zobaczyć szczegóły
            </div>
        </div>
    </aside>
    
    <div id="map"></div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>
    
    <script>
        // Global variables
        let allFeatures = [];
        let parcelsLayer = null;
        let selectedFile = null;
        
        // Constants
        const MAX_FILE_SIZE = 200 * 1024 * 1024; // 200MB
        const MAX_PARCELS = 100; // Limit displayed parcels
        
        // Initialize Leaflet map centered on Poland
        const map = L.map('map').setView([52, 19], 7);
        
        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);
        
        // ============================================
        // File Upload Handling
        // ============================================
        
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('gml_file');
        const fileInfo = document.getElementById('file_info');
        const filename = document.getElementById('filename');
        const filesize = document.getElementById('filesize');
        const processBtn = document.getElementById('process_btn');
        const errorMessage = document.getElementById('error_message');
        const loadingIndicator = document.getElementById('loading');
        const emptyState = document.getElementById('empty_state');
        const filterSection = document.getElementById('filter_section');
        const detailsSection = document.getElementById('details_section');
        
        // Click on dropzone to open file picker
        dropzone.addEventListener('click', () => fileInput.click());
        
        // File input change
        fileInput.addEventListener('change', handleFileSelect);
        
        // Drag and drop handlers
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });
        
        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });
        
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        function handleFileSelect(e) {
            const files = e.target.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }
        
        function handleFile(file) {
            // Check file extension
            if (!file.name.toLowerCase().endsWith('.gml')) {
                showError('Proszę wybrać plik z rozszerzeniem .gml');
                return;
            }
            
            // Check file size
            if (file.size > MAX_FILE_SIZE) {
                showError('Plik jest większy niż 200MB. Wybierz mniejszy plik.');
                return;
            }
            
            // Show file info
            selectedFile = file;
            filename.textContent = file.name;
            filesize.textContent = formatFileSize(file.size);
            fileInfo.style.display = 'flex';
            processBtn.disabled = false;
            hideError();
        }
        
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('active');
        }
        
        function hideError() {
            errorMessage.classList.remove('active');
        }
        
        // Process button click
        processBtn.addEventListener('click', processGMLFile);
        
        async function processGMLFile() {
            if (!selectedFile) return;
            
            // Show loading, hide other elements
            loadingIndicator.classList.add('active');
            processBtn.disabled = true;
            hideError();
            
            try {
                // Read file as text
                const text = await readFileAsText(selectedFile);
                
                // Parse GML and extract features
                const features = parseGML(text);
                
                if (features.length === 0) {
                    showError('Nie znaleziono działek w pliku GML');
                    loadingIndicator.classList.remove('active');
                    processBtn.disabled = false;
                    return;
                }
                
                // Store features and display on map
                allFeatures = features;
                displayFeaturesOnMap(features);
                
                // Show filter and details sections
                emptyState.style.display = 'none';
                filterSection.style.display = 'block';
                detailsSection.style.display = 'block';
                
                // Update filter count
                updateFilterCount();
                
            } catch (error) {
                console.error('Error processing GML:', error);
                showError('Błąd przetwarzania pliku: ' + error.message);
            } finally {
                loadingIndicator.classList.remove('active');
                processBtn.disabled = false;
            }
        }
        
        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(new Error('Nie udało się odczytać pliku'));
                reader.readAsText(file);
            });
        }
        
        // ============================================
        // GML Parsing
        // ============================================
        
        function parseGML(gmlText) {
            // Create a DOM parser
            const parser = new DOMParser();
            const doc = parser.parseFromString(gmlText, 'application/xml');
            
            // Check for parsing errors
            const parseError = doc.querySelector('parsererror');
            if (parseError) {
                throw new Error('Niepoprawny format pliku XML');
            }
            
            // Extract namespace from root element
            const root = doc.documentElement;
            const gmlNs = root.getAttribute('xmlns:gml') || 'http://www.opengis.net/gml/3.2';
            const rcnNs = root.getAttribute('xmlns:rcn') || 'urn:gugik:specyfikacje:gmlas:rejestrcennieruchomosci:1.0';
            
            // Helper to get elements by local name with namespace
            function getElementsByTagNameNS(parent, localName, ns) {
                // Try with namespace first
                let elements = parent.getElementsByTagNameNS(ns, localName);
                if (elements.length === 0) {
                    // Fallback: search by local name
                    elements = [];
                    const allElements = parent.getElementsByTagName('*');
                    for (let el of allElements) {
                        if (el.localName === localName || el.tagName.endsWith(':' + localName)) {
                            elements.push(el);
                        }
                    }
                }
                return elements;
            }
            
            // Extract all transactions
            const transactions = {};
            const transElements = getElementsByTagNameNS(doc, 'RCN_Transakcja', rcnNs);
            
            for (let transEl of transElements) {
                const transId = transEl.getAttributeNS(gmlNs, 'id') || transEl.id;
                const data = extractTransactionData(transEl, gmlNs, rcnNs);
                if (transId && data) {
                    transactions[transId] = data;
                }
            }
            
            // Extract all parcels
            const parcels = {};
            const parcelElements = getElementsByTagNameNS(doc, 'RCN_Dzialka', rcnNs);
            
            for (let parcelEl of parcelElements) {
                const parcelId = parcelEl.getAttributeNS(gmlNs, 'id') || parcelEl.id;
                const data = extractParcelData(parcelEl, gmlNs, rcnNs);
                if (parcelId && data) {
                    parcels[parcelId] = data;
                }
            }
            
            // Join transactions to parcels
            const features = [];
            let count = 0;
            
            for (let [parcelId, parcel] of Object.entries(parcels)) {
                if (count >= MAX_PARCELS) break;
                
                // Find transactions that reference this parcel
                let matchingTrans = null;
                for (let [transId, trans] of Object.entries(transactions)) {
                    if (trans.parcelRef === parcelId) {
                        matchingTrans = trans;
                        break;
                    }
                }
                
                if (parcel.geometry && parcel.geometry.length > 0) {
                    // Convert EPSG:2178 to WGS84
                    const wgs84Coords = convertPolygonToWGS84(parcel.geometry);
                    
                    const feature = {
                        type: 'Feature',
                        id: parcelId,
                        properties: {
                            parcel_number: parcel.parcelNumber,
                            price: matchingTrans ? matchingTrans.price : null,
                            date: matchingTrans ? matchingTrans.date : null,
                            type: matchingTrans ? matchingTrans.type : null,
                            area: parcel.area
                        },
                        geometry: {
                            type: 'Polygon',
                            coordinates: [wgs84Coords]
                        }
                    };
                    
                    features.push(feature);
                    count++;
                }
            }
            
            return features;
        }
        
        function extractTransactionData(transEl, gmlNs, rcnNs) {
            const data = {
                price: null,
                date: null,
                type: null,
                parcelRef: null
            };
            
            // Get all child elements
            const children = transEl.children;
            for (let child of children) {
                const localName = child.localName || child.tagName.split(':').pop();
                
                if (localName === 'cenaTransakcjiBrutto') {
                    const text = child.textContent;
                    if (text) {
                        data.price = parseFloat(text);
                    }
                } else if (localName === 'rodzajTransakcji') {
                    data.type = child.textContent;
                } else if (localName === 'IdRCN') {
                    // Find wersjaId
                    const wersjaId = child.getElementsByTagName('*');
                    for (let el of wersjaId) {
                        if ((el.localName || '').endsWith('wersjaId')) {
                            const match = el.textContent.match(/(\d{4}-\d{2}-\d{2})/);
                            if (match) {
                                data.date = match[1];
                            }
                            break;
                        }
                    }
                } else if (localName === 'nieruchomosc') {
                    // Get xlink:href
                    data.parcelRef = child.getAttribute('href') || child.getAttributeNS('http://www.w3.org/1999/xlink', 'href');
                }
            }
            
            return data;
        }
        
        function extractParcelData(parcelEl, gmlNs, rcnNs) {
            const data = {
                parcelNumber: null,
                geometry: null,
                area: null
            };
            
            const children = parcelEl.children;
            for (let child of children) {
                const localName = child.localName || child.tagName.split(':').pop();
                
                if (localName === 'idDzialki') {
                    data.parcelNumber = child.textContent;
                } else if (localName === 'geometria') {
                    data.geometry = extractGeometry(child, gmlNs);
                } else if (localName === 'polePowierzchniEwidencyjnej') {
                    const text = child.textContent;
                    if (text) {
                        data.area = parseFloat(text);
                    }
                }
            }
            
            return data;
        }
        
        function extractGeometry(geomEl, gmlNs) {
            // Find Polygon element
            const polygons = geomEl.getElementsByTagNameNS(gmlNs, 'Polygon');
            if (polygons.length === 0) {
                // Try without namespace
                const allElements = geomEl.getElementsByTagName('*');
                for (let el of allElements) {
                    if ((el.localName || '').endsWith('Polygon')) {
                        polygons.push(el);
                        break;
                    }
                }
            }
            
            if (polygons.length === 0) return null;
            
            const polygon = polygons[0];
            
            // Find exterior ring
            const exteriors = polygon.getElementsByTagNameNS(gmlNs, 'exterior');
            if (exteriors.length === 0) {
                const allElements = polygon.getElementsByTagName('*');
                for (let el of allElements) {
                    if ((el.localName || '').endsWith('exterior')) {
                        exteriors.push(el);
                        break;
                    }
                }
            }
            
            if (exteriors.length === 0) return null;
            
            const exterior = exteriors[0];
            
            // Find LinearRing
            const rings = exterior.getElementsByTagNameNS(gmlNs, 'LinearRing');
            if (rings.length === 0) {
                const allElements = exterior.getElementsByTagName('*');
                for (let el of allElements) {
                    if ((el.localName || '').endsWith('LinearRing')) {
                        rings.push(el);
                        break;
                    }
                }
            }
            
            if (rings.length === 0) return null;
            
            const ring = rings[0];
            
            // Find posList
            const posLists = ring.getElementsByTagNameNS(gmlNs, 'posList');
            if (posLists.length === 0) {
                const allElements = ring.getElementsByTagName('*');
                for (let el of allElements) {
                    if ((el.localName || '').endsWith('posList')) {
                        posLists.push(el);
                        break;
                    }
                }
            }
            
            if (posLists.length === 0) return null;
            
            const posList = posLists[0];
            return parsePosList(posList.textContent);
        }
        
        function parsePosList(text) {
            if (!text) return [];
            
            try {
                const values = text.trim().split(/[\s,]+/);
                const coords = [];
                for (let i = 0; i < values.length - 1; i += 2) {
                    const x = parseFloat(values[i]);
                    const y = parseFloat(values[i + 1]);
                    if (!isNaN(x) && !isNaN(y)) {
                        coords.push([x, y]);
                    }
                }
                return coords;
            } catch (e) {
                return [];
            }
        }
        
        // ============================================
        // Coordinate Conversion (EPSG:2178 to WGS84)
        // ============================================
        
        // Poland CS2000 (EPSG:2178) uses the following parameters:
        // GRS80 ellipsoid
        // +proj=tmerc +lat_0=0 +lon_0=19 +k=0.9993 +x_0=500000 +y_0=0
        // For proper conversion, we use a simplified formula
        
        function convertPolygonToWGS84(coords2178) {
            return coords2178.map(coord => convertPoint2178ToWGS84(coord[0], coord[1]));
        }
        
        function convertPoint2178ToWGS84(x, y) {
            // EPSG:2178 (Poland CS2000) to WGS84
            // Using transverse mercator inverse
            // Central meridian: 19°E
            // False easting: 500000m
            // False northing: 0m
            // Scale factor: 0.9993
            
            const a = 6378137.0;        // Semi-major axis (WGS84)
            const f = 1 / 298.257223563; // Flattening (WGS84)
            const k0 = 0.9993;           // Scale factor
            const lon0 = 19 * Math.PI / 180;  // Central meridian in radians
            const x0 = 500000;           // False easting
            const y0 = 0;                // False northing
            
            // Normalized coordinates
            const xn = (x - x0) / (a * k0);
            const yn = (y - y0) / (a * k0);
            
            // Iterative solution for latitude
            let B = yn;
            for (let i = 0; i < 5; i++) {
                const sinB = Math.sin(B);
                const cosB = Math.cos(B);
                const sin2B = sinB * sinB;
                const eta2 = 0.006739496775 * cosB * cosB;
                const N = a / Math.sqrt(1 - 0.006694380023 * sin2B);
                
                B = yn + (N * sinB * cosB * eta2) / 2 - 
                    (N * sinB * cosB * cosB * (5 - 9 * eta2 + eta2 * eta2)) / 6;
            }
            
            // Calculate latitude and longitude
            const sinB = Math.sin(B);
            const cosB = Math.cos(B);
            const tanB = sinB / cosB;
            const sin2B = sinB * sinB;
            const cos2B = cosB * cosB;
            const eta2 = 0.006739496775 * cos2B;
            const N = a / Math.sqrt(1 - 0.006694380023 * sin2B);
            
            // Latitude
            const latRad = B - (tanB * cos2B * eta2) / 2 +
                          (tanB * cos2B * cos2B * (5 - 9 * eta2 + eta2 * eta2)) / 24;
            
            // Longitude
            const lonRad = xn / cosB - 
                          (cos2B * (1 - tanB * tanB + eta2)) * xn * xn * xn / 6 +
                          (cos2B * cos2B * (5 - 18 * tanB * tanB + tanB * tanB * tanB * tanB)) * Math.pow(xn, 5) / 120;
            
            const lat = latRad * 180 / Math.PI;
            const lon = lon0 * 180 / Math.PI + lonRad * 180 / Math.PI;
            
            return [lon, lat];
        }
        
        // ============================================
        // Map Display
        // ============================================
        
        function displayFeaturesOnMap(features) {
            // Clear existing layer
            if (parcelsLayer) {
                map.removeLayer(parcelsLayer);
            }
            
            // Style function: green if has price, gray if no price
            function style(feature) {
                const hasPrice = feature.properties && feature.properties.price !== null && feature.properties.price > 0;
                return {
                    fillColor: hasPrice ? '#22c55e' : '#6b7280',
                    fillOpacity: 0.5,
                    color: hasPrice ? '#16a34a' : '#4b5563',
                    weight: 1
                };
            }
            
            // Create and add GeoJSON layer
            parcelsLayer = L.geoJSON(features, {
                style: style,
                onEachFeature: function(feature, layer) {
                    if (feature.properties && feature.properties.parcel_number) {
                        const popupText = `Parcel: ${feature.properties.parcel_number}`;
                        layer.bindPopup(popupText);
                    }
                    // Add click handler for details panel
                    layer.on('click', showDetails);
                }
            }).addTo(map);
            
            // Fit map to parcel bounds
            if (features.length > 0) {
                map.fitBounds(parcelsLayer.getBounds());
            }
        }
        
        // Filter function
        function filterFeatures() {
            const priceMin = document.getElementById('price_min').value;
            const priceMax = document.getElementById('price_max').value;
            const dateFrom = document.getElementById('date_from').value;
            const dateTo = document.getElementById('date_to').value;
            
            const filtered = allFeatures.filter(feature => {
                const props = feature.properties || {};
                const price = props.price;
                const date = props.date;
                
                // Price filter
                if (priceMin && price !== null && price < parseFloat(priceMin)) {
                    return false;
                }
                if (priceMax && price !== null && price > parseFloat(priceMax)) {
                    return false;
                }
                
                // Date filter
                if (dateFrom && date) {
                    const featureDate = new Date(date);
                    const fromDate = new Date(dateFrom);
                    if (featureDate < fromDate) {
                        return false;
                    }
                }
                if (dateTo && date) {
                    const featureDate = new Date(date);
                    const toDate = new Date(dateTo);
                    if (featureDate > toDate) {
                        return false;
                    }
                }
                
                return true;
            });
            
            // Clear and re-add layer with filtered features
            if (parcelsLayer) {
                parcelsLayer.clearLayers();
                parcelsLayer.addData(filtered);
            }
            
            // Update count
            document.getElementById('filter_count').textContent = `${filtered.length}/${allFeatures.length}`;
        }
        
        function updateFilterCount() {
            document.getElementById('filter_count').textContent = `${allFeatures.length}/${allFeatures.length}`;
        }
        
        // Show parcel details in sidebar
        function showDetails(event) {
            const feature = event.target.feature;
            const props = feature.properties || {};
            
            const detailsContent = document.getElementById('details_content');
            detailsContent.classList.remove('empty');
            
            // Build details HTML
            const html = [
                '<div class="detail-row">',
                    '<span class="detail-label">Numer działki</span>',
                    '<span class="detail-value">' + (props.parcel_number || '-') + '</span>',
                '</div>',
                '<div class="detail-row">',
                    '<span class="detail-label">Cena</span>',
                    '<span class="detail-value price">' + (props.price ? props.price.toLocaleString() + ' zł' : '-') + '</span>',
                '</div>',
                '<div class="detail-row">',
                    '<span class="detail-label">Data</span>',
                    '<span class="detail-value">' + (props.date || '-') + '</span>',
                '</div>',
                '<div class="detail-row">',
                    '<span class="detail-label">Typ</span>',
                    '<span class="detail-value">' + (props.type || '-') + '</span>',
                '</div>',
                '<div class="detail-row">',
                    '<span class="detail-label">Powierzchnia</span>',
                    '<span class="detail-value">' + (props.area ? props.area + ' m²' : '-') + '</span>',
                '</div>'
            ].join('');
            
            detailsContent.innerHTML = html;
        }
        
        // Export filtered data to CSV
        function exportCSV() {
            // Get currently displayed features from the layer
            if (!parcelsLayer) return;
            
            const visibleFeatures = [];
            parcelsLayer.eachLayer(function(layer) {
                if (layer.feature) {
                    visibleFeatures.push(layer.feature);
                }
            });
            
            if (visibleFeatures.length === 0) {
                alert('Brak danych do eksportu');
                return;
            }
            
            // CSV header
            const headers = ['id', 'parcel_number', 'price', 'date', 'type', 'area'];
            const csvRows = [headers.join(',')];
            
            // Add data rows
            visibleFeatures.forEach((feature, index) => {
                const props = feature.properties || {};
                const row = [
                    index + 1,
                    '"' + (props.parcel_number || '') + '"',
                    props.price || '',
                    '"' + (props.date || '') + '"',
                    '"' + (props.type || '') + '"',
                    props.area || ''
                ];
                csvRows.push(row.join(','));
            });
            
            // Trigger download
            const csvContent = 'data:text/csv;charset=utf-8,' + csvRows.join('\n');
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement('a');
            link.setAttribute('href', encodedUri);
            link.setAttribute('download', 'parcels.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        // Event listeners
        document.getElementById('export_btn').addEventListener('click', exportCSV);
        document.getElementById('filter_btn').addEventListener('click', filterFeatures);
    </script>
